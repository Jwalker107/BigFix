<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BigFix Content Viewer</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="brand"><div class="brand-badge">BF</div>&nbsp; BigFix Content Viewer</div>
    <a class="repo-link" id="repo-link" href="#" target="_blank" rel="noopener">github.com/bigfix/content</a>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <input type="search" id="search-box" placeholder="Filter files by name...">
      <div class="status-line">
        <span id="status-text">Loading file list&hellip;</span>
        <button id="refresh-btn" title="Reload file list from GitHub">Refresh</button>
      </div>
      <div id="tree-root"></div>
    </aside>

    <main class="main" id="main">
      <div class="placeholder">
        <h2>Select a file to preview</h2>
        <p>Choose a .bes fixlet, task, or analysis from the list on the left. Its Title, Description, Relevance and Action/Property content will render here.</p>
      </div>
    </main>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
  <script src="vendor/hljs-bigfix-relevance.js"></script>
  <script src="app.js"></script>
</body>
</html>
